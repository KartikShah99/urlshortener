apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: urlshortener-{{ .Values.env }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.backend.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: run-migrations
          image: {{ .Values.backend.image }}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: urlshortener-secret
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: urlshortener-config
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: urlshortener-secret
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: urlshortener-config
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
