apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: urlshortener-{{ .Values.env }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      containers:
        - name: flower
          image: {{ .Values.backend.image }}
          command: ["celery", "-A", "worker.celery_app", "flower", "--port=5555", "--address=0.0.0.0"]
          ports:
            - containerPort: 5555
          env:
            - name: FLOWER_PORT
              value: "5555"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: flower
  namespace: urlshortener-{{ .Values.env }}
spec:
  selector:
    app: flower
  ports:
    - port: 5555
      targetPort: 5555
